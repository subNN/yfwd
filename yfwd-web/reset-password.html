<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>一饭为定 · 重置密码</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <link rel="stylesheet" href="auth.css">
  <link rel="icon" type="image/jpeg" href="一饭为定.jpg">
  <style>
    /* === 柱状图排序验证码 样式（与注册页保持一致） === */
    .captcha-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }
    .captcha-label {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0;
    }
    .captcha-label svg {
      width: 14px;
      height: 14px;
      color: #6366f1;
    }
    .captcha-timer {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: #6366f1;
      background: #eef2ff;
      padding: 0.3rem 0.7rem;
      border-radius: 999px;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .captcha-timer svg { width: 13px; height: 13px; }
    .captcha-timer.urgent {
      background: #fef2f2;
      color: #dc2626;
      animation: captchaPulse 0.8s ease infinite alternate;
    }
    @keyframes captchaPulse {
      from { opacity: 0.7; }
      to { opacity: 1; }
    }

    .captcha-card {
      background: linear-gradient(135deg, #ffffff 0%, #fafbff 100%);
      border: 2px solid #e5e7eb;
      border-radius: 1rem;
      padding: 1rem 1.1rem 0.85rem;
      transition: border-color 0.2s ease;
    }
    .captcha-card:hover { border-color: #c7d2fe; }

    .captcha-instruction {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.6rem;
      margin-bottom: 0.75rem;
      font-size: 0.82rem;
      color: #4b5563;
    }
    .captcha-instruction .instruction-icon { font-size: 0.95rem; }
    .captcha-instruction .instruction-text {
      flex: 1;
      line-height: 1.4;
    }
    .captcha-instruction em {
      color: #6366f1;
      font-style: normal;
      font-weight: 600;
    }

    .captcha-refresh {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      background: transparent;
      border: 1.5px solid #e5e7eb;
      color: #6b7280;
      padding: 0.4rem 0.6rem;
      border-radius: 0.6rem;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.15s ease;
    }
    .captcha-refresh svg { width: 13px; height: 13px; }
    .captcha-refresh:hover:not(:disabled) {
      background: #6366f1;
      border-color: #6366f1;
      color: #fff;
    }
    .captcha-refresh:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .captcha-bars-container {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 0.5rem;
      height: 140px;
      padding: 0.5rem 0.2rem 0.3rem;
      position: relative;
    }
    .captcha-bars-container::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, #d1d5db 50%, transparent 100%);
      border-radius: 1px;
      opacity: 0.5;
    }

    .captcha-bar {
      flex: 0 0 auto;
      min-width: 0;
      width: 16.666%;
      height: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      cursor: grab;
      user-select: none;
      position: relative;
      transition: transform 0.2s ease;
      box-sizing: border-box;
      padding: 0 2px;
    }
    .captcha-bar:active { cursor: grabbing; }

    .captcha-bar-inner {
      width: 100%;
      max-width: 42px;
      background: linear-gradient(180deg, #818cf8 0%, #6366f1 60%, #4f46e5 100%);
      border-radius: 0.45rem 0.45rem 0.25rem 0.25rem;
      position: relative;
      box-shadow: 0 4px 8px rgba(99, 102, 241, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.3);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      animation: captchaBarIn 0.4s ease both;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 0.35rem;
      flex-shrink: 0;
    }
    @keyframes captchaBarIn {
      from { transform: translateY(15px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .captcha-bar:nth-child(2) .captcha-bar-inner { animation-delay: 0.05s; }
    .captcha-bar:nth-child(3) .captcha-bar-inner { animation-delay: 0.1s; }
    .captcha-bar:nth-child(4) .captcha-bar-inner { animation-delay: 0.15s; }
    .captcha-bar:nth-child(5) .captcha-bar-inner { animation-delay: 0.2s; }
    .captcha-bar:nth-child(6) .captcha-bar-inner { animation-delay: 0.25s; }

    .captcha-bar:hover .captcha-bar-inner {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.35);
    }

    .captcha-bar-top {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      height: 8px;
      background: linear-gradient(180deg, #a5b4fc 0%, #818cf8 100%);
      border-radius: 0.35rem 0.35rem 0.15rem 0.15rem;
      opacity: 0.8;
    }

    .captcha-bar-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
      margin-top: 0.35rem;
    }

    .captcha-bar-placeholder { cursor: default; }
    .captcha-bar-placeholder .captcha-bar-inner {
      background: #d1d5db;
      box-shadow: none;
      animation: none;
    }

    .captcha-hint {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.5rem;
      font-size: 0.78rem;
      color: #6b7280;
      line-height: 1.4;
    }
    .captcha-hint.error { color: #dc2626; }
    .captcha-hint svg { flex-shrink: 0; }

    .captcha-card {
      position: relative;
      overflow: hidden;
    }
    .captcha-verified-overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      background: rgba(243, 250, 246, 0.96);
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      border-radius: 0.85rem;
      animation: verifiedIn 0.35s ease both;
    }
    .captcha-verified-overlay svg {
      width: 2.8rem;
      height: 2.8rem;
      color: #16a34a;
      stroke-width: 2.5;
      filter: drop-shadow(0 2px 4px rgba(22, 163, 74, 0.3));
    }
    .captcha-verified-overlay span {
      font-size: 0.95rem;
      font-weight: 600;
      color: #16a34a;
    }
    @keyframes verifiedIn {
      from { opacity: 0; transform: scale(0.92); }
      to { opacity: 1; transform: scale(1); }
    }
    .captcha-bars-container.captcha-disabled {
      opacity: 0.35;
      filter: grayscale(0.6);
      pointer-events: none;
    }
    .captcha-instruction .captcha-refresh:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    @media (max-width: 480px) {
      .captcha-bars-container { height: 110px; gap: 0.35rem; }
      .captcha-bar-inner { max-width: 32px; }
      .captcha-bar-label { font-size: 0.65rem; }
      .captcha-instruction { font-size: 0.78rem; }
    }

    /* === 密码重置页专用样式 === */
    .reset-page {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
      overflow: hidden;
    }
    .reset-page::before {
      content: "";
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      top: -200px;
      right: -150px;
      filter: blur(60px);
    }
    .reset-page::after {
      content: "";
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      bottom: -150px;
      left: -100px;
      filter: blur(60px);
    }
    .reset-card {
      background: #fff;
      border-radius: 1.25rem;
      padding: 2rem;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      position: relative;
      z-index: 1;
    }
    .reset-header {
      text-align: center;
      margin-bottom: 1.2rem;
    }
    .reset-logo {
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      text-decoration: none;
    }
    .reset-logo img {
      width: 44px;
      height: 44px;
      border-radius: 12px;
    }
    .reset-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1e293b;
      margin: 0.7rem 0 0.3rem;
    }
    .reset-subtitle {
      font-size: 0.85rem;
      color: #64748b;
      margin: 0;
    }
    .form-group { margin-bottom: 1rem; }
    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #334155;
      margin-bottom: 0.4rem;
    }
    .form-input {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 0.65rem;
      font-size: 0.9rem;
      color: #1e293b;
      background: #f8fafc;
      transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      box-sizing: border-box;
    }
    .form-input:focus {
      outline: none;
      border-color: #6366f1;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
    }
    .form-input.with-icon { padding-left: 2.75rem; }
    .input-wrapper { position: relative; width: 100%; }
    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      display: flex;
      align-items: center;
      pointer-events: none;
    }
    .input-icon svg { width: 18px; height: 18px; }

    .password-wrapper { position: relative; }
    .password-toggle {
      position: absolute;
      right: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      padding: 0.3rem;
      border-radius: 0.3rem;
      display: flex;

    }
    .password-toggle:hover { color: #6366f1; background: #f1f5f9; }
    .password-toggle .icon { width: 18px; height: 18px; }

    .code-row {
      display: flex;
      gap: 0.6rem;
      align-items: stretch;
    }
    .code-row input { flex: 1; min-width: 0; }
    .code-button {
      padding: 0.7rem 1rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 0.65rem;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }
    .code-button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 12px rgba(102, 126, 234, 0.35);
    }
    .code-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      background: #94a3b8;
    }
    .code-hint {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.45rem;
      font-size: 0.8rem;
      color: #64748b;
    }
    .code-hint.error { color: #dc2626; }

    .submit-button {
      width: 100%;
      padding: 0.85rem 1.5rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 0.75rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.3rem;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }
    .submit-button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }
    .submit-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-message {
      font-size: 0.78rem;
      color: #dc2626;
      margin: 0.35rem 0 0;
      line-height: 1.4;
    }
    .error-alert {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 0.9rem;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 0.6rem;
      margin-top: 0.7rem;
      color: #b91c1c;
      font-size: 0.82rem;
      line-height: 1.5;
    }
    .success-alert {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.8rem 1rem;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 0.6rem;
      margin-top: 0.7rem;
      color: #15803d;
      font-size: 0.85rem;
      line-height: 1.5;
      font-weight: 500;
    }

    .auth-link {
      margin-top: 1.3rem;
      text-align: center;
      font-size: 0.85rem;

    }
    .auth-link a {
      color: #6366f1;
      text-decoration: none;

    }
    .auth-link a:hover { text-decoration: underline; }

    /* 密码强度条 */
    .password-strength {
      margin-top: 0.5rem;
    }
    .strength-bars {
      display: flex;
      gap: 0.2rem;
      margin-bottom: 0.25rem;
    }
    .strength-bars span {
      flex: 1;
      height: 4px;
      background: #e5e7eb;
      border-radius: 2px;
      transition: background 0.2s ease;

<body>
  <div id="auth-app"></div>

  <script type="module">
    import { API_BASE_URL } from './store.js?v=20260615-samwaf';
    import { AnimatedCharacters, createApp, ref, computed, onMounted, onUnmounted } from './auth.js';

    const { defineComponent } = Vue;
    const EMAIL_RE = /^[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}$/;

    const getQueryParam = (name) => {
      try {
        const url = new URL(window.location.href);
        return decodeURIComponent(url.searchParams.get(name) || '').trim();
      } catch (e) { return ''; }
    };

    const passwordStrength = (pwd) => {
      if (!pwd) return { score: 0, label: '请输入新密码', color: '#e5e7eb' };
      let score = 0;
      if (pwd.length >= 6) score++;
      if (pwd.length >= 10) score++;
      if (/[A-Z]/.test(pwd) && /[a-z]/.test(pwd)) score++;
      if (/\d/.test(pwd)) score++;
      if (/[^\w\s]/.test(pwd)) score++;
      const map = [
        { label: '请输入新密码', color: '#e5e7eb' },
        { label: '弱：太简单了', color: '#ef4444' },
        { label: '较弱', color: '#f97316' },
        { label: '中等', color: '#eab308' },
        { label: '良好', color: '#22c55e' },
        { label: '强：非常安全', color: '#10b981' },
      ];
      return { score, ...map[Math.min(score, 5)] };
    };

    const ResetPage = defineComponent({
      name: 'ResetPage',
      components: { AnimatedCharacters },
      setup() {
        const email = ref(getQueryParam('email'));
        const emailReadonly = ref(Boolean(email.value));
        const code = ref('');
        const password = ref('');
        const confirmPassword = ref('');
        const showPassword = ref(false);
        const showConfirm = ref(false);
        const isTyping = ref(false);
        const isLoading = ref(false);
        const isSendingCode = ref(false);
        const errorMessage = ref('');
        const codeHint = ref('');
        const codeHintError = ref(false);
        const resetSuccess = ref(false);

        // 柱状图排序验证码
        const captchaId = ref('');
        const captchaBars = ref([]);
        const captchaExpired = ref(0);
        const captchaHint = ref('拖动柱子：从左到右按从高到低排序');
        const captchaHintError = ref(false);
        const captchaVerified = ref(false);
        const isLoadingCaptcha = ref(false);
        let captchaTimer = null;
        let dragSrcIdx = -1;

        const cooldown = ref(0);
        let cooldownTimer = null;

        const errors = ref({ email: '', code: '', password: '', confirm: '' });

        const strength = computed(() => passwordStrength(password.value));

        const canSendCode = computed(() =>
          !isSendingCode.value &&
          cooldown.value === 0 &&
          EMAIL_RE.test(email.value.trim()) &&
          captchaBars.value.length > 0
        );

        const clearCaptchaTimer = () => {
          if (captchaTimer) { clearInterval(captchaTimer); captchaTimer = null; }
        };

        const loadCaptcha = async () => {
          clearCaptchaTimer();
          captchaExpired.value = 0;
          captchaVerified.value = false;
          isLoadingCaptcha.value = true;
          captchaHintError.value = false;
          captchaHint.value = '正在生成验证码...';

          const base = API_BASE_URL.replace(/\/+$/, '');
          try {
            const res = await fetch(`${base}/api/auth/captcha`, { method: 'GET' });
            let data = {};
            try {
              data = await res.json();
            } catch (jsonErr) {
              data = { success: false };
            }
            if (data.success && Array.isArray(data.bars) && data.bars.length > 0) {
              captchaId.value = data.captcha_id || '';
              captchaBars.value = [...data.bars];
              captchaHint.value = '拖动柱子：从左到右按从高到低排序';
              const limit = Number(data.time_limit) || 20;
              captchaExpired.value = limit;
              captchaTimer = setInterval(() => {
                captchaExpired.value -= 1;
                if (captchaExpired.value <= 0) {
                  clearCaptchaTimer();
                  captchaExpired.value = 0;
                  captchaHintError.value = true;
                  captchaHint.value = '验证已超时，请点击刷新按钮重新生成';
                  captchaBars.value = [];
                  captchaId.value = '';
                }
              }, 1000);
            } else {
              captchaHintError.value = true;
              captchaBars.value = [];
              captchaId.value = '';
              captchaHint.value = data.message || '验证码生成失败，请点击刷新按钮重试';
            }
          } catch (err) {
            captchaHintError.value = true;
            captchaBars.value = [];
            captchaId.value = '';
            captchaHint.value = '网络错误：请确保后端服务已启动';
          } finally {
            isLoadingCaptcha.value = false;
          }
        };

        const onDragStart = (e, idx) => {
          if (captchaExpired.value <= 0) return;
          dragSrcIdx = idx;
          const target = e.currentTarget;
          if (e.dataTransfer) {
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', String(idx));
          }
          target.style.opacity = '0.45';
        };
        const onDragEnd = (e) => {
          if (e.currentTarget) e.currentTarget.style.opacity = '1';
          dragSrcIdx = -1;
        };
        const onDragOver = (e) => {
          if (captchaExpired.value <= 0) return;
          if (e.preventDefault) e.preventDefault();
          if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
          return false;
        };

        let verifyingCaptcha = false;

        const verifyCaptcha = async () => {
          if (verifyingCaptcha) return;
          if (captchaVerified.value) return;
          if (!captchaId.value || captchaBars.value.length === 0) return;
          if (captchaExpired.value <= 0) return;

          verifyingCaptcha = true;
          const answer = captchaBars.value.map(b => b.id).join(',');
          const base = API_BASE_URL.replace(/\/+$/, '');

          try {
            const res = await fetch(`${base}/api/auth/verify-captcha`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                captcha_id: captchaId.value,
                captcha_answer: answer,
              }),
            });
            let data = {};
            try { data = await res.json(); } catch (e) { data = { success: false }; }

            if (data.success) {
              captchaVerified.value = true;
              clearCaptchaTimer();
              captchaHintError.value = false;
              captchaHint.value = '人机验证通过，请点击发送验证码';
            }
          } catch (err) {
            // 网络错误忽略
          } finally {
            verifyingCaptcha = false;
          }
        };

        const onDrop = (e, targetIdx) => {
          if (captchaExpired.value <= 0) return;
          if (captchaVerified.value) return;
          if (e.preventDefault) e.preventDefault();
          if (e.stopPropagation) e.stopPropagation();
          const srcIdx = dragSrcIdx;
          if (srcIdx === -1 || srcIdx === targetIdx) return;
          const newBars = [...captchaBars.value];
          const [moved] = newBars.splice(srcIdx, 1);
          newBars.splice(targetIdx, 0, moved);
          captchaBars.value = newBars;
          verifyCaptcha();
        };

        // 移动端触摸拖动
        let touchEl = null;
        let touchGhost = null;
        let touchStartIdx = -1;
        let touchLastTargetIdx = -1;
        let touchContainer = null;

        const onTouchStart = (e, idx) => {
          if (captchaExpired.value <= 0) return;
          if (!e.touches || e.touches.length === 0) return;
          touchStartIdx = idx;
          const t = e.touches[0];
          touchEl = e.currentTarget;
          touchContainer = document.querySelector('.captcha-bars-container');
          touchGhost = touchEl.cloneNode(true);
          touchGhost.style.position = 'fixed';
          touchGhost.style.zIndex = '9999';
          touchGhost.style.pointerEvents = 'none';
          touchGhost.style.opacity = '0.8';
          touchGhost.style.transform = 'scale(1.08)';
          const rect = touchEl.getBoundingClientRect();
          touchGhost.style.left = (rect.left + (rect.width / 2) - 25) + 'px';
          touchGhost.style.top = (rect.top + (rect.height / 2) - (rect.height / 2)) + 'px';
          touchGhost.style.width = rect.width + 'px';
          touchGhost.style.height = rect.height + 'px';
          touchGhost.style.transition = 'none';
          document.body.appendChild(touchGhost);
          touchEl.style.opacity = '0.3';
        };

        const getBarIdxFromTouch = (touchX) => {
          if (!touchContainer) return -1;
          const rect = touchContainer.getBoundingClientRect();
          const relX = touchX - rect.left;
          if (relX < 0 || relX > rect.width) return -1;
          const barCount = captchaBars.value.length;
          if (barCount === 0) return -1;
          const cellWidth = rect.width / barCount;
          const idx = Math.floor(relX / cellWidth);
          return Math.max(0, Math.min(barCount - 1, idx));
        };

        const onTouchMove = (e) => {
          if (!touchGhost || !e.touches || e.touches.length === 0) return;
          if (e.preventDefault) e.preventDefault();
          const t = e.touches[0];
          const rect = touchEl.getBoundingClientRect();
          touchGhost.style.left = (t.clientX - 25) + 'px';
          touchGhost.style.top = (t.clientY - (rect.height / 2)) + 'px';
          const targetIdx = getBarIdxFromTouch(t.clientX);
          if (targetIdx >= 0 && targetIdx !== touchLastTargetIdx) {
            touchLastTargetIdx = targetIdx;
            const allBars = touchContainer.querySelectorAll('.captcha-bar');
            allBars.forEach((el, i) => {
              el.style.transition = 'transform 0.2s ease';
              if (i === targetIdx && targetIdx !== touchStartIdx) {
                el.style.transform = 'translateY(-6px)';
              } else {
                el.style.transform = '';
              }
            });
          }
        };

        const onTouchEnd = () => {
          if (touchGhost) {
            try { document.body.removeChild(touchGhost); } catch (e) {}
            touchGhost = null;
          }
          if (touchEl) {
            touchEl.style.opacity = '1';
            touchEl = null;
          }
          if (touchContainer) {
            const allBars = touchContainer.querySelectorAll('.captcha-bar');
            allBars.forEach((el) => { el.style.transform = ''; });
          }
          const targetIdx = touchLastTargetIdx;
          const startIdx = touchStartIdx;
          touchStartIdx = -1;
          touchLastTargetIdx = -1;
          if (captchaExpired.value <= 0) return;
          if (captchaVerified.value) return;
          if (targetIdx < 0 || targetIdx === startIdx) return;
          const newBars = [...captchaBars.value];
          const [moved] = newBars.splice(startIdx, 1);
          newBars.splice(targetIdx, 0, moved);
          captchaBars.value = newBars;
          verifyCaptcha();
        };

        const sendCode = async () => {
          if (!canSendCode.value) return;
          codeHint.value = '正在发送验证码...';
          codeHintError.value = false;
          isSendingCode.value = true;

          const answerText = captchaBars.value.map((b) => b.id).join(',');
          const base = API_BASE_URL.replace(/\/+$/, '');

          try {
            const res = await fetch(`${base}/api/auth/send-code`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                email: email.value.trim().toLowerCase(),
                purpose: 'reset-password',
                captcha_id: captchaId.value,
                captcha_answer: answerText,
              }),
            });
            let data = {};
            try {
              data = await res.json();
            } catch (jsonErr) {
              data = { success: false, message: '服务器响应异常，请稍后重试' };
            }
            if (data.success) {
              codeHint.value = `验证码已发送至 ${email.value.trim()}，10 分钟内有效`;
              captchaVerified.value = true;
              clearCaptchaTimer();
              const cd = Number(data.cooldown) || 60;
              cooldown.value = cd;
              if (cooldownTimer) clearInterval(cooldownTimer);
              cooldownTimer = setInterval(() => {
                cooldown.value -= 1;
                if (cooldown.value <= 0) {
                  clearInterval(cooldownTimer);
                  cooldownTimer = null;
                  cooldown.value = 0;
                }
              }, 1000);
              captchaHint.value = '验证码已通过，请继续输入邮箱验证码';
              captchaHintError.value = false;
            } else {
              codeHintError.value = true;
              codeHint.value = data.message || data.error || '验证码发送失败';
              if (data.error === 'CAPTCHA_FAILED') {
                setTimeout(() => { loadCaptcha(); }, 800);
              } else if (data.error === 'USER_NOT_FOUND') {
                codeHint.value = '该邮箱未注册';
              } else if (data.error && data.error.startsWith('RATE_LIMIT_')) {
                // 限流错误，不刷新验证码
              } else {
                setTimeout(() => { loadCaptcha(); }, 800);
              }
            }
          } catch (err) {
            codeHintError.value = true;
            codeHint.value = '网络错误，请检查网络或后端服务是否启动';
          } finally {
            isSendingCode.value = false;
          }
        };

        const validate = () => {
          errors.value = { email: '', code: '', password: '', confirm: '' };
          let ok = true;
          if (!email.value.trim()) {
            errors.value.email = '请输入邮箱';
            ok = false;
          } else if (!EMAIL_RE.test(email.value.trim())) {
            errors.value.email = '邮箱格式不正确';
            ok = false;
          }
          if (!code.value.trim()) {
            errors.value.code = '请输入邮箱验证码';
            ok = false;
          } else if (!/^\d{4,8}$/.test(code.value.trim())) {
            errors.value.code = '验证码格式不正确';
            ok = false;
          }
          if (!password.value) {
            errors.value.password = '请输入新密码';
            ok = false;
          } else if (password.value.length < 6) {
            errors.value.password = '密码至少 6 位';
            ok = false;
          }
          if (!confirmPassword.value) {
            errors.value.confirm = '请再次输入新密码';
            ok = false;
          } else if (password.value !== confirmPassword.value) {
            errors.value.confirm = '两次输入的密码不一致';
            ok = false;
          }
          return ok;
        };

        const handleReset = async () => {
          if (!validate()) return;
          isLoading.value = true;
          errorMessage.value = '';

          const base = API_BASE_URL.replace(/\/+$/, '');
          try {
            const res = await fetch(`${base}/api/auth/reset-password`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                email: email.value.trim().toLowerCase(),
                code: code.value.trim(),
                password: password.value,
              }),
            });
            let data = {};
            try {
              data = await res.json();
            } catch (jsonErr) {
              data = { success: false, message: '服务器响应异常，请稍后重试' };
            }
            if (data.success) {
              resetSuccess.value = true;
              setTimeout(() => {
                window.location.href = 'login.html';
              }, 2000);
            } else {
              errorMessage.value = data.message || data.error || '密码重置失败';
            }
          } catch (err) {
            errorMessage.value = '网络错误，请检查网络或后端服务是否启动';
          } finally {
            isLoading.value = false;
          }
        };

        onMounted(() => {
          loadCaptcha();
        });

        onUnmounted(() => {
          clearCaptchaTimer();
          if (cooldownTimer) { clearInterval(cooldownTimer); cooldownTimer = null; }
        });

        return {
          email, emailReadonly, code, password, confirmPassword,
          showPassword, showConfirm, isTyping, isLoading, isSendingCode,
          errorMessage, codeHint, codeHintError, resetSuccess,
          captchaId, captchaBars, captchaExpired, captchaHint, captchaHintError, captchaVerified, isLoadingCaptcha,
          cooldown, strength, errors, canSendCode,
          loadCaptcha, sendCode, handleReset,
          onDragStart, onDragEnd, onDragOver, onDrop,
          onTouchStart, onTouchMove, onTouchEnd,
        };
      },
      template: `
        <div class="reset-page">
          <div class="reset-card">
            <div class="reset-header">
              <a href="login.html" class="reset-logo">
                <img src="一饭为定.jpg" alt="一饭为定" />
              </a>
              <h2 class="reset-title">重置密码</h2>
              <p class="reset-subtitle">输入邮箱验证码并设置新密码</p>
            </div>

            <div v-if="resetSuccess" class="success-alert">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 6 9 17l-5-5" />
              </svg>
              <span>密码重置成功！正在跳转至登录页...</span>
            </div>

            <form @submit.prevent="handleReset" v-if="!resetSuccess">

              <!-- 邮箱 -->
              <div class="form-group">
                <label for="email" class="form-label">邮箱</label>
                <div class="input-wrapper">
                  <span class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <rect width="20" height="16" x="2" y="4" rx="2" />
                      <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                    </svg>
                  </span>
                  <input id="email" v-model="email" type="email" placeholder="请输入注册邮箱"
                    class="form-input with-icon" :readonly="emailReadonly" @focus="isTyping = true" @blur="isTyping = false" />
                </div>
                <p v-if="errors.email" class="error-message">{{ errors.email }}</p>
              </div>

              <!-- 柱状图排序验证码 -->
              <div class="form-group">
                <div class="captcha-header">
                  <label class="form-label captcha-label">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M12 2 4 6v6c0 4.5 3.5 8.2 8 10 4.5-1.8 8-5.5 8-10V6l-8-4z" />
                    </svg>
                    人机验证：柱状图排序
                  </label>
                  <div class="captcha-timer" :class="{ urgent: captchaExpired <= 7 }">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <circle cx="12" cy="12" r="10" />
                      <polyline points="12 6 12 12 16 14" />
                    </svg>
                    <span v-if="captchaExpired > 0">{{ captchaExpired }}s</span>
                    <span v-else>--</span>
                  </div>
                </div>

                <div class="captcha-card">
                    <div v-if="captchaVerified" class="captcha-verified-overlay">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" />
                        <polyline points="9 11 12 14 22 4" />
                      </svg>
                      <span>已通过人机验证</span>
                    </div>
                  <div class="captcha-instruction">
                    <span class="instruction-icon">📊</span>
                    <span class="instruction-text">拖动柱子：从左到右按 <em>从高到低</em> 排序</span>
                    <button type="button" class="captcha-refresh" @click="loadCaptcha" :disabled="isLoadingCaptcha || captchaVerified" title="重新生成">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12a9 9 0 1 1-3-6.7L21 8" />
                        <path d="M21 3v5h-5" />
                      </svg>
                    </button>
                  </div>

                  <div class="captcha-bars-container" :class="{ 'captcha-disabled': captchaVerified }">
                    <template v-if="captchaBars.length > 0">
                      <div v-for="(bar, idx) in captchaBars" :key="bar.id"
                        class="captcha-bar"
                        :draggable="!captchaVerified"
                        @dragstart="onDragStart($event, idx)"
                        @dragend="onDragEnd"
                        @dragover="onDragOver"
                        @drop="onDrop($event, idx)"
                        @touchstart.passive="onTouchStart($event, idx)"
                        @touchmove.prevent="onTouchMove"
                        @touchend="onTouchEnd">
                        <div class="captcha-bar-inner" :style="{ height: (bar.height * 1.3) + 'px', minHeight: (bar.height * 1.3) + 'px' }">
                          <div class="captcha-bar-top"></div>
                          <div class="captcha-bar-label">{{ bar.height }}</div>
                        </div>
                      </div>
                    </template>
                    <template v-else>
                      <div v-for="i in 6" :key="'placeholder-' + i" class="captcha-bar captcha-bar-placeholder">
                        <div class="captcha-bar-inner" style="height: 42px; min-height: 42px; opacity: 0.25;"></div>
                      </div>
                    </template>
                  </div>

                  <p :class="['captcha-hint', captchaHintError ? 'error' : '']">
                    <svg v-if="!captchaHintError" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M12 2 4 6v6c0 4.5 3.5 8.2 8 10 4.5-1.8 8-5.5 8-10V6l-8-4z" />
                    </svg>
                    <svg v-else xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <circle cx="12" cy="12" r="10" />
                      <line x1="12" x2="12" y1="8" y2="12" />
                      <line x1="12" x2="12.01" y1="16" y2="16" />
                    </svg>
                    <span>{{ captchaHint }}</span>
                  </p>
                </div>
              </div>

              <!-- 邮箱验证码 -->
              <div class="form-group">
                <label for="code" class="form-label">邮箱验证码</label>
                <div class="code-row">
                  <input id="code" v-model="code" type="text" inputmode="numeric" maxlength="8"
                    placeholder="6 位数字" class="form-input" @focus="isTyping = true" @blur="isTyping = false" />
                  <button type="button" class="code-button" :disabled="!canSendCode || isSendingCode" @click="sendCode">
                    <span v-if="isSendingCode">发送中...</span>
                    <span v-else-if="cooldown > 0">{{ cooldown }}s 后重发</span>
                    <span v-else>发送验证码</span>
                  </button>
                </div>
                <p v-if="codeHint" :class="['code-hint', codeHintError ? 'error' : '']">{{ codeHint }}</p>
                <p v-if="errors.code" class="error-message">{{ errors.code }}</p>
              </div>

              <!-- 新密码 -->
              <div class="form-group">
                <label for="password" class="form-label">新密码</label>
                <div class="password-wrapper">
                  <input id="password" v-model="password"
                    :type="showPassword ? 'text' : 'password'"
                    placeholder="至少 6 位" class="form-input"
                    @focus="isTyping = true" @blur="isTyping = false" />
                  <button type="button" @click="showPassword = !showPassword" class="password-toggle">
                    <svg v-if="showPassword" class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" /><circle cx="12" cy="12" r="3" />
                    </svg>
                    <svg v-else class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
                      <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" />
                      <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
                      <line x1="2" x2="22" y1="2" y2="22" />
                    </svg>
                  </button>
                </div>
                <div v-if="password" class="password-strength">
                  <div class="strength-bars">
                    <span v-for="i in 5" :key="i" :style="{ background: i <= strength.score ? strength.color : '' }"></span>
                  </div>
                  <div class="strength-label" :style="{ color: strength.color }">{{ strength.label }}</div>
                </div>
                <p v-if="errors.password" class="error-message">{{ errors.password }}</p>
              </div>

              <!-- 确认密码 -->
              <div class="form-group">
                <label for="confirm" class="form-label">确认密码</label>
                <div class="password-wrapper">
                  <input id="confirm" v-model="confirmPassword"
                    :type="showConfirm ? 'text' : 'password'"
                    placeholder="再次输入新密码" class="form-input"
                    @focus="isTyping = true" @blur="isTyping = false" />
                  <button type="button" @click="showConfirm = !showConfirm" class="password-toggle">
                    <svg v-if="showConfirm" class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" /><circle cx="12" cy="12" r="3" />
                    </svg>
                    <svg v-else class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
                      <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" />
                      <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
                      <line x1="2" x2="22" y1="2" y2="22" />
                    </svg>
                  </button>
                </div>
                <p v-if="errors.confirm" class="error-message">{{ errors.confirm }}</p>
              </div>

              <div v-if="errorMessage" class="error-alert">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10" /><line x1="12" x2="12" y1="8" y2="12" /><line x1="12" x2="12.01" y1="16" y2="16" />
                </svg>
                <span>{{ errorMessage }}</span>
              </div>

              <button type="submit" class="submit-button" :disabled="isLoading">
                <span v-if="isLoading">重置中...</span>
                <span v-else>确认重置</span>
              </button>

              <div class="auth-link">
                想起密码了？<a href="login.html">返回登录</a>
              </div>

            </form>
          </div>
        </div>
      `,
    });

    const app = createApp(ResetPage);
    app.mount('#auth-app');
  </script>
</body>
</html>
